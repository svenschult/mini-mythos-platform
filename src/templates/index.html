<!DOCTYPE html>
<html>
<head>
    <title>Mini Mythos</title>
</head>
<body>
    <h1>Mini Mythos Pentest Assistant</h1>

    <form action="/analyze" method="post">
        <label>Scan auswählen:</label>
        <select name="scan_file">
            {% for file in files %}
                <option value="{{ file }}">{{ file }}</option>
            {% endfor %}
        </select>

        <button type="submit">Analysieren</button>
    </form>
</body>
</html>
